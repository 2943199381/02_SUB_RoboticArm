trajectory_bspline_jerk_planner_node:
  ros__parameters:
    payload_attached_topic: /payload_attached
    payload_attached_initial: false
    planner_hz: 500.0
    hold_last_state: true

    max_cartesian_speed: 0.3
    max_cartesian_acceleration_accel: 0.2
    max_cartesian_acceleration_decel: 0.1
    max_cartesian_jerk_accel: 5.0
    max_cartesian_jerk_decel: 2.5

    derivative_step: 0.001
    max_planning_steps: 60000
